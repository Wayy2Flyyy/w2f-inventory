<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --slot-bg:rgba(10,12,14,.62);
    --slot-bg-hover:rgba(22,25,29,.74);
    --panel-line:rgba(255,255,255,.07);
    --line:rgba(255,255,255,.08);
    --line-hover:rgba(255,255,255,.45);
    --text:#f2f3f4;
    --muted:rgba(255,255,255,.55);
    --faint:rgba(255,255,255,.3);
    --green:#3ddc84;
    --green-dim:rgba(61,220,132,.16);
    --red:#e06049;
    --amber:#e0c24d;
    --r-common:rgba(255,255,255,.18);
    --r-uncommon:#6fbf6b;
    --r-rare:#5d9fe0;
    --r-epic:#a878e8;
    --r-legendary:#e8b13f;
    --radius:6px;
    --font:"Archivo",sans-serif;
  }

  /* lift + bob amplitude as registered properties so they TRANSITION —
     hover fades in, and fades back out on leave, instead of snapping */
  @property --lift{syntax:'<length>';inherits:false;initial-value:0px}
  @property --amp{syntax:'<length>';inherits:false;initial-value:0px}

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    /* page backdrop only — set to transparent for NUI overlay */
    background:
      radial-gradient(60% 32% at 50% 110%, rgba(61,220,132,.12), transparent 70%),
      radial-gradient(ellipse at center, rgba(0,0,0,.25) 0%, rgba(0,0,0,.78) 100%),
      linear-gradient(160deg,#2b3036,#171a1e 60%,#101214);
    color:var(--text);
    font-family:var(--font);
    min-height:100dvh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:30px 22px;
    user-select:none;
    overflow-x:hidden;
  }
  body::before{ /* faint diagonal hatch ground */
    content:"";position:fixed;inset:0;pointer-events:none;
    background-image:repeating-linear-gradient(115deg, rgba(255,255,255,1) 0 1px, transparent 1px 16px);
    opacity:.015;
  }

  [tabindex]:focus-visible,input:focus-visible,button:focus-visible{
    outline:2px solid var(--green);outline-offset:2px;
  }
  button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}

  .app{
    display:grid;
    grid-template-columns:92px minmax(0,1fr) 272px minmax(0,1fr);
    gap:24px;
    width:min(1420px,100%);
    align-items:start;
    perspective:1500px;
    perspective-origin:50% 38%;
  }

  /* every part of the rig sits at an angle;
     hovering a section eases it subtly toward focus — flatter, closer, a touch larger */
  .tilt-l,.tilt-r{
    transform:rotateY(var(--ry)) translateZ(var(--tz,0px)) scale(var(--sc,1));
    transition:transform .5s cubic-bezier(.25,.8,.3,1);
  }
  .tilt-l{--ry:8deg;animation:pin-l .65s cubic-bezier(.2,.7,.3,1) backwards}
  .tilt-r{--ry:-8deg;animation:pin-r .65s cubic-bezier(.2,.7,.3,1) backwards}
  .tilt-l:hover{--ry:4.5deg;--tz:16px;--sc:1.012}
  .tilt-r:hover{--ry:-4.5deg;--tz:16px;--sc:1.012}
  @keyframes pin-l{from{opacity:0;transform:rotateY(24deg) translateX(-46px)}to{opacity:1;transform:rotateY(8deg)}}
  @keyframes pin-r{from{opacity:0;transform:rotateY(-24deg) translateX(46px)}to{opacity:1;transform:rotateY(-8deg)}}

  /* ============ panels ============ */
  .panel{position:relative;display:flex;flex-direction:column;gap:12px;padding:16px 16px 18px}

  .plate{
    position:absolute;inset:0;z-index:-1;
    background:rgba(8,10,13,.46);
    backdrop-filter:blur(5px);
    border:1px solid var(--panel-line);
  }
  .tilt-l .plate{clip-path:polygon(18px 0, 100% 0, 100% calc(100% - 18px), calc(100% - 18px) 100%, 0 100%, 0 18px)}
  .tilt-r .plate{clip-path:polygon(0 0, calc(100% - 18px) 0, 100% 18px, 100% 100%, 18px 100%, 0 calc(100% - 18px))}
  .plate::before{ /* accent slash along the top edge */
    content:"";
    position:absolute;top:0;left:24px;
    width:86px;height:2px;
    background:linear-gradient(90deg,var(--green),transparent);
    transform:skewX(-30deg);
  }

  .panel-head{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:14px;
    padding:0 2px;
  }
  .who{display:flex;flex-direction:column;gap:2px}
  .who .name{
    display:inline-block;
    font-size:17px;font-weight:700;letter-spacing:.04em;
    text-transform:uppercase;
    transform:skewX(-8deg);
  }
  .who .meta{font-size:11px;font-weight:500;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
  .head-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
  .kg{font-size:12px;font-weight:600;color:var(--muted);font-variant-numeric:tabular-nums}
  .kg b{color:var(--text)}
  .money{display:flex;gap:6px}
  .chip{
    font-size:10px;font-weight:600;
    font-variant-numeric:tabular-nums;
    color:var(--muted);
    border:1px solid var(--line);
    border-radius:3px;
    padding:1px 6px;
  }
  .chip b{color:var(--green);font-weight:600}
  .id-left{display:flex;align-items:center;gap:10px}
  .avatar{
    width:36px;height:36px;flex:none;
    display:flex;align-items:center;justify-content:center;
    background:var(--slot-bg);
    backdrop-filter:blur(6px);
    border:1px solid var(--line);
    border-radius:var(--radius);
    font-size:13px;font-weight:700;letter-spacing:.05em;
    color:var(--muted);
  }

  .wbar{position:relative;height:4px;border-radius:2px;background:rgba(255,255,255,.08);overflow:hidden}
  .wbar::after{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:repeating-linear-gradient(90deg, transparent 0 calc(25% - 1px), rgba(0,0,0,.55) calc(25% - 1px) 25%);
  }
  .wbar .fill{
    height:100%;width:0%;border-radius:2px;
    background:linear-gradient(90deg,#2fae69,var(--green));
    transition:width .3s ease-out;
  }
  .wbar.heavy .fill{background:linear-gradient(90deg,#d97a2b,var(--amber));animation:wpulse 1.6s ease-in-out infinite}
  @keyframes wpulse{0%,100%{opacity:1}50%{opacity:.65}}

  /* ============ slot grid ============ */
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}

  .divider{
    grid-column:1/-1;
    height:1px;
    background:var(--panel-line);
    position:relative;
    margin:2px 0;
  }
  .divider::after{
    content:"POCKETS";
    position:absolute;right:0;top:-6px;
    font-size:8px;font-weight:600;
    letter-spacing:.3em;
    color:var(--faint);
    background:transparent;
    padding-left:8px;
  }

  .slot{position:relative;aspect-ratio:1.22/1;cursor:default}
  .slot.filled{cursor:grab}
  .slot.filled:active{cursor:grabbing}

  /* hang layer: idle drift, snaps straight under the cursor */
  .hang{
    position:absolute;inset:0;
    transform-origin:50% -30%;
    animation:sway var(--dur,7s) ease-in-out var(--delay,0s) infinite alternate;
    will-change:transform;
  }
  @keyframes sway{
    from{transform:rotate(var(--tilt,.6deg)) translateY(0)}
    to  {transform:rotate(calc(var(--tilt,.6deg) * -0.6)) translateY(1.6px)}
  }

  .face{
    position:absolute;inset:0;
    background:var(--slot-bg);
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    border:1px solid var(--line);
    border-radius:var(--radius);
    overflow:hidden;
    display:flex;align-items:center;justify-content:center;
    animation:facefloat 2.6s ease-in-out infinite alternate;
    transition:background .28s ease, border-color .28s ease,
               --lift .3s ease, --amp .5s ease;
  }
  @keyframes facefloat{
    from{transform:translateY(calc(-1 * var(--lift)))}
    to{transform:translateY(calc(-1 * var(--lift) - var(--amp)))}
  }
  .slot.empty .face{background:rgba(10,12,14,.34);border-color:var(--panel-line)}

  .face::before{ /* rarity hairline */
    content:"";
    position:absolute;top:0;left:0;right:0;height:2px;
    background:var(--r-common);opacity:.9;
  }
  .slot.empty .face::before{display:none}
  .slot[data-rarity="uncommon"] .face::before{background:var(--r-uncommon)}
  .slot[data-rarity="rare"] .face::before{background:var(--r-rare)}
  .slot[data-rarity="epic"] .face::before{background:var(--r-epic)}
  .slot[data-rarity="legendary"] .face::before{background:var(--r-legendary)}

  .glyph{
    width:34px;height:34px;
    color:var(--text);
    margin-bottom:16px;
    opacity:.95;
    transition:transform .2s cubic-bezier(.3,1.4,.5,1);
  }

  .qty{position:absolute;top:6px;left:8px;font-size:11px;font-weight:600;font-variant-numeric:tabular-nums}
  .wt{position:absolute;top:6px;right:8px;font-size:10px;font-weight:500;color:var(--faint);font-variant-numeric:tabular-nums}
  .hotkey{
    position:absolute;bottom:24px;right:7px;
    font-size:9px;font-weight:700;color:var(--muted);
    border:1px solid var(--line);border-radius:3px;
    padding:0 4px;line-height:13px;
    transition:color .15s ease,border-color .15s ease;
  }

  .name{
    position:absolute;left:0;right:0;bottom:0;
    padding:4px 6px 5px;
    font-size:10.5px;font-weight:600;
    letter-spacing:.04em;text-transform:uppercase;text-align:center;
    color:var(--muted);
    background:rgba(0,0,0,.34);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    transition:color .15s ease;
  }

  .dura{position:absolute;left:0;right:0;bottom:23px;height:3px;background:rgba(0,0,0,.4)}
  .dura i{display:block;height:100%;background:var(--green)}
  .dura.low i{background:var(--amber)}
  .dura.crit i{background:var(--red)}

  /* hover / focus = control */
  .slot.filled:hover .hang,
  .slot.filled:focus-visible .hang,
  .slot.dragging .hang{animation:none;transform:none}
  .slot.filled:hover .face,
  .slot.filled:focus-visible .face{
    background:var(--slot-bg-hover);
    border-color:var(--line-hover);
    --lift:2.6px;
    --amp:1.6px;
  }
  .slot.filled:hover .glowfx,
  .slot.filled:focus-visible .glowfx{opacity:.95}
  .slot.filled:hover .glyph{transform:scale(1.09) translateY(-1px)}
  .slot.empty:hover .face{border-color:rgba(255,255,255,.18)}
  .slot.empty:hover .glowfx{opacity:.4}
  .slot.filled:hover .name{color:var(--text)}
  .slot.filled:hover .hotkey{color:var(--green);border-color:var(--green)}
  .slot.selected .face{border-color:var(--green)}

  .slot.dragging{opacity:.3}
  .slot.over .hang{animation:none;transform:none}
  .slot.over .face{border-color:var(--green);background:var(--green-dim)}
  .slot.flash .face{border-color:var(--green)}
  .slot.deny .face{animation:deny .26s ease}
  @keyframes deny{
    0%,100%{translate:0 0}
    25%{translate:-3px 0}
    60%{translate:3px 0}
  }
  .slot.deny .face{border-color:var(--red)}

  .ghost{
    position:fixed;z-index:60;pointer-events:none;
    translate:-50% -55%;rotate:-2deg;
    width:96px;aspect-ratio:1.22/1;
    background:var(--slot-bg-hover);
    backdrop-filter:blur(6px);
    border:1px solid var(--green);
    border-radius:var(--radius);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 16px 40px rgba(0,0,0,.55);
  }
  .ghost svg{width:30px;height:30px}
  .ghost .gq{position:absolute;top:5px;left:7px;font-size:11px;font-weight:600}

  /* staggered entrance on open */
  .slot.boot{animation:boot .5s cubic-bezier(.2,.7,.3,1) var(--bdelay,0s) both}
  @keyframes boot{
    from{opacity:0;transform:translateY(12px) scale(.96)}
    to{opacity:1;transform:none}
  }

  /* destination settle after a move */
  .slot.settle .face{animation:settle .26s cubic-bezier(.3,1.4,.5,1)}
  @keyframes settle{0%{transform:scale(.93)}100%{transform:scale(1)}}

  /* item flying between slots (quick-move, drop, split) */
  .fly{
    position:fixed;z-index:65;
    translate:-50% -50%;
    pointer-events:none;
    transition:left .28s cubic-bezier(.3,.8,.3,1), top .28s cubic-bezier(.3,.8,.3,1),
               opacity .28s ease, scale .28s ease;
  }
  .fly svg{width:26px;height:26px;color:var(--text);filter:drop-shadow(0 8px 14px rgba(0,0,0,.5))}

  /* hover glow layer — blurred wash behind the face, tinted by rarity */
  .glowfx{
    position:absolute;inset:-3px;
    border-radius:9px;
    background:radial-gradient(65% 75% at 50% 55%, var(--glowc, rgba(255,255,255,.16)), transparent 72%);
    filter:blur(9px);
    opacity:0;
    transition:opacity .4s ease;
    animation:glowbreathe 2.6s ease-in-out infinite alternate;
    pointer-events:none;
  }
  @keyframes glowbreathe{
    from{transform:scale(1)}
    to{transform:scale(1.06)}
  }
  .slot[data-rarity="uncommon"]{--glowc:rgba(111,191,107,.32)}
  .slot[data-rarity="rare"]{--glowc:rgba(93,159,224,.36)}
  .slot[data-rarity="epic"]{--glowc:rgba(168,120,232,.4)}
  .slot[data-rarity="legendary"]{--glowc:rgba(232,177,63,.4)}

  /* faint top sheen on filled slots */
  .slot.filled .face::after{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(80% 55% at 50% 0%, rgba(255,255,255,.05), transparent 70%);
  }

  /* lock marker */
  .lockicon{position:absolute;bottom:26px;left:7px;width:11px;height:11px;color:var(--amber)}

  /* ============ side action rail (the old middle column) ============ */
  .rail{
    display:flex;flex-direction:column;gap:9px;
    margin-top:64px;
    position:sticky;top:30px;
    transform:rotateY(16deg);
    animation:pin-rail .7s cubic-bezier(.2,.7,.3,1) both;
  }
  @keyframes pin-rail{from{opacity:0;transform:rotateY(34deg) translateX(-60px)}to{opacity:1;transform:rotateY(16deg)}}
  .rail .rail-label{
    font-size:8px;font-weight:700;
    letter-spacing:.34em;text-transform:uppercase;
    color:var(--faint);
    transform:skewX(-8deg);
    padding-left:4px;
  }
  .rail .fld{display:flex;flex-direction:column;gap:4px}
  .rail .fld label{
    font-size:8px;font-weight:600;
    letter-spacing:.26em;text-transform:uppercase;
    color:var(--faint);
    text-align:center;
  }
  .rail input{
    width:100%;
    background:var(--slot-bg);
    backdrop-filter:blur(6px);
    border:1px solid var(--line);
    color:var(--text);
    font:600 13px var(--font);
    text-align:center;
    padding:9px 6px;
    font-variant-numeric:tabular-nums;
    appearance:textfield;
    -moz-appearance:textfield;
    transform:skewX(-10deg);
  }
  .rail input::-webkit-outer-spin-button,
  .rail input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .rail input::placeholder{color:var(--faint);font-weight:500}
  .rail button{
    min-height:40px;
    background:var(--slot-bg);
    backdrop-filter:blur(6px);
    border:1px solid var(--line);
    border-left:2px solid var(--line);
    font-size:11px;font-weight:700;
    letter-spacing:.14em;text-transform:uppercase;
    color:var(--muted);
    transform:skewX(-10deg);
    transition:color .15s ease,border-color .15s ease,background .15s ease,transform .15s ease;
  }
  .rail button span{display:inline-block;transform:skewX(10deg)}
  .rail button:hover{
    color:var(--text);
    border-color:var(--line-hover);
    background:var(--slot-bg-hover);
    transform:skewX(-10deg) translateX(3px);
  }
  .rail button.use:hover{color:var(--green);border-color:var(--green);border-left-color:var(--green)}
  .rail button.close:hover{color:var(--red);border-color:var(--red);border-left-color:var(--red)}
  .rail .hint{
    margin-top:6px;
    font-size:9px;font-weight:500;
    letter-spacing:.1em;text-transform:uppercase;
    color:var(--faint);text-align:center;line-height:1.9;
  }

  /* ============ centre: full-body status ============ */
  .status{
    position:relative;
    display:flex;flex-direction:column;gap:14px;
    align-items:center;
    padding:18px 16px 20px;
    --tz:26px;--sc:1;
    transform:translateZ(var(--tz)) scale(var(--sc));
    transition:transform .5s cubic-bezier(.25,.8,.3,1);
    animation:pin-c .7s cubic-bezier(.2,.7,.3,1) .1s backwards;
  }
  .status:hover{--tz:44px;--sc:1.015}
  @keyframes pin-c{from{opacity:0;transform:translateZ(-50px) translateY(14px)}to{opacity:1;transform:translateZ(26px)}}
  .status .plate{clip-path:polygon(18px 0, calc(100% - 18px) 0, 100% 18px, 100% calc(100% - 18px), calc(100% - 18px) 100%, 18px 100%, 0 calc(100% - 18px), 0 18px)}
  .status h2{
    align-self:flex-start;
    font-size:12px;font-weight:700;
    letter-spacing:.3em;text-transform:uppercase;
    color:var(--muted);
    transform:skewX(-8deg);
  }
  .body{position:relative;width:190px;height:252px;perspective:620px}
  .bodyrot{
    position:absolute;inset:0;
    transition:transform .25s ease;
  }

  /* limb hotspots — the body is inspectable */
  .limbs{position:absolute;inset:0}
  .limb{
    position:absolute;
    cursor:pointer;
    border-radius:40%;
    transition:background .2s ease;
  }
  .limb{overflow:hidden}.limb::before{content:"";position:absolute;inset:0;background:radial-gradient(closest-side, var(--inj,transparent) 0%, transparent 70%);opacity:0;transition:opacity .25s ease}.limb.hurt{--inj:rgba(224,194,77,.55)}.limb.crit{--inj:rgba(224,96,73,.62)}.limb.hurt::before,.limb.crit::before{opacity:1}.limb:hover::before{opacity:.9}
  .limb .dot{
    position:absolute;left:50%;top:50%;
    width:5px;height:5px;
    translate:-50% -50%;
    border-radius:50%;
    background:var(--amber);
    box-shadow:0 0 3px var(--amber);
    animation:dotpulse 1.4s ease-in-out infinite;
  }
  .limb.crit .dot{background:var(--red);box-shadow:0 0 3px var(--red)}
  @keyframes dotpulse{0%,100%{opacity:1}50%{opacity:.4}}
  .limb.ping::after{
    content:"";
    position:absolute;left:50%;top:50%;
    width:14px;height:14px;
    translate:-50% -50%;
    border:2px solid var(--green);
    border-radius:50%;
    animation:ping .45s ease-out both;
  }
  @keyframes ping{from{opacity:1;scale:.4}to{opacity:0;scale:1.3}}

  .injroots{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:3;overflow:visible}
  .injroots line{stroke:var(--amber);stroke-width:1;opacity:.7;vector-effect:non-scaling-stroke}
  .injroots line.crit{stroke:var(--red)}
  .injroots circle{fill:var(--amber)}
  .injroots circle.crit{fill:var(--red)}
  .injtags{position:absolute;inset:0;pointer-events:none;z-index:4;overflow:visible}
  .injtag{position:absolute;font-size:7px;font-weight:700;letter-spacing:.04em;color:var(--amber);background:rgba(0,0,0,.6);padding:1px 4px;border-radius:3px;white-space:nowrap;text-shadow:0 1px 2px rgba(0,0,0,.9)}
  .injtag.crit{color:var(--red)}
  .limbinfo{
    min-height:14px;
    font-size:9px;font-weight:700;
    letter-spacing:.22em;text-transform:uppercase;
    color:var(--faint);
    transform:skewX(-8deg);
    transition:color .2s ease;
  }
  .limbinfo.on{color:var(--green)}
  .limbinfo.hurt{color:var(--amber)}
  .limbinfo.crit{color:var(--red)}
  .body img{
    position:absolute;inset:0;
    width:100%;height:100%;
    object-fit:contain;
    pointer-events:none;
    user-select:none;
    -webkit-user-drag:none;
  }
  .body .out{filter:grayscale(1) brightness(1.7);opacity:.13}
  .body .fillwrap{
    position:absolute;inset:0;
    clip-path:inset(0% 0 0 0);
    transition:clip-path .5s ease, filter .5s ease;
    filter:drop-shadow(0 0 18px rgba(61,220,132,.35));
    animation:holo 4.5s ease-in-out infinite alternate;
  }
  @keyframes holo{from{opacity:.92}to{opacity:1}}
  .body.low .fillwrap{
    filter:hue-rotate(-115deg) saturate(1.15) drop-shadow(0 0 18px rgba(224,194,77,.35));
  }
  .body.crit .fillwrap{
    filter:hue-rotate(-155deg) saturate(1.3) drop-shadow(0 0 18px rgba(224,96,73,.45));
    animation:critpulse 1.1s ease-in-out infinite;
  }
  @keyframes critpulse{0%,100%{opacity:1}50%{opacity:.5}}
  /* hunger / thirst read as an aura around the figure — no bars */
  .body::before,.body::after{
    content:"";position:absolute;inset:0;
    pointer-events:none;z-index:5;
    opacity:0;transition:opacity .5s ease;
  }
  .body::before{background:radial-gradient(ellipse 68% 82% at 50% 50%, transparent 50%, rgba(224,162,77,.30) 88%, rgba(224,162,77,.04) 100%)}
  .body::after {background:radial-gradient(ellipse 68% 82% at 50% 50%, transparent 50%, rgba(77,198,224,.28) 88%, rgba(77,198,224,.04) 100%)}
  .body.hungry::before{opacity:1;animation:aura 2.6s ease-in-out infinite}
  .body.thirsty::after{opacity:1;animation:aura 2.6s ease-in-out infinite}
  @keyframes aura{0%,100%{opacity:.5}50%{opacity:1}}

  /* ============ tooltip ============ */
  .tip{
    position:fixed;z-index:55;
    width:230px;
    background:rgba(8,10,12,.92);
    backdrop-filter:blur(10px);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:11px 12px 12px;
    pointer-events:none;
    opacity:0;
    translate:0 4px;
    transition:opacity .14s ease, translate .14s ease;
  }
  .tip.show{opacity:1;translate:0 0}
  .tip h4{font-size:13px;font-weight:700;letter-spacing:.03em;text-transform:uppercase}
  .tip .rar{
    display:inline-block;margin-top:2px;
    font-size:9px;font-weight:600;
    letter-spacing:.22em;text-transform:uppercase;
    color:var(--r-common);
  }
  .tip .rar[data-r="uncommon"]{color:var(--r-uncommon)}
  .tip .rar[data-r="rare"]{color:var(--r-rare)}
  .tip .rar[data-r="epic"]{color:var(--r-epic)}
  .tip .rar[data-r="legendary"]{color:var(--r-legendary)}
  .tip p{margin-top:7px;font-size:11px;line-height:1.55;color:var(--muted)}
  .tip .rows{margin-top:9px;border-top:1px solid var(--panel-line)}
  .tip .row{
    display:flex;justify-content:space-between;
    padding:4px 0;
    border-bottom:1px solid var(--panel-line);
    font-size:10px;
  }
  .tip .row span:first-child{color:var(--faint);font-weight:500;letter-spacing:.1em;text-transform:uppercase}
  .tip .row span:last-child{font-weight:600;font-variant-numeric:tabular-nums}

  /* ============ context menu ============ */
  .menu{
    position:fixed;z-index:70;
    min-width:140px;
    background:rgba(8,10,12,.94);
    backdrop-filter:blur(10px);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:4px;
    display:none;
    flex-direction:column;
  }
  .menu.show{display:flex}
  .menu button{
    text-align:left;
    padding:8px 10px;
    border-radius:4px;
    font-size:11px;font-weight:600;
    letter-spacing:.1em;text-transform:uppercase;
    color:var(--muted);
    transition:background .12s ease,color .12s ease;
  }
  .menu button:hover{background:rgba(255,255,255,.06);color:var(--text)}
  .menu button.danger:hover{color:var(--red)}
  .menu button:disabled{opacity:.3;cursor:not-allowed}

  /* ============ toast ============ */
  .toast{
    position:fixed;z-index:80;
    top:26px;left:50%;
    translate:-50% -8px;
    background:rgba(8,10,12,.92);
    backdrop-filter:blur(10px);
    border:1px solid var(--line);
    border-left:2px solid var(--green);
    border-radius:var(--radius);
    padding:8px 16px;
    font-size:11px;font-weight:600;
    letter-spacing:.08em;text-transform:uppercase;
    opacity:0;
    transition:opacity .2s ease, translate .2s ease;
    pointer-events:none;
  }
  .toast.show{opacity:1;translate:-50% 0}
  .toast.err{border-left-color:var(--red)}

  /* ============ responsive ============ */
  @media (max-width:1100px){
    .app{grid-template-columns:1fr;gap:26px;perspective:none}
    .tilt-l,.tilt-r,.status,
    .tilt-l:hover,.tilt-r:hover,.status:hover{transform:none;animation:fadein .4s ease both}
    .rail{
      margin-top:0;position:static;transform:none;
      flex-direction:row;flex-wrap:wrap;align-items:flex-end;
      animation:fadein .4s ease both;
    }
    @keyframes fadein{from{opacity:0}to{opacity:1}}
    .rail .fld{width:84px}
    .rail button{flex:1;min-width:90px}
    .rail .hint,.rail .rail-label{display:none}
    .status{order:-1}
    .body{width:140px;height:186px}
    .tip{display:none}
  }
  @media (max-width:560px){
    .grid{grid-template-columns:repeat(4,1fr);gap:10px}
  }

  @media (prefers-reduced-motion:reduce){
    .hang{animation:none}
    *,*::before,*::after{transition:none !important;animation:none !important}
    .slot.filled:hover .face,
    .slot.filled:focus-visible .face{transform:translateY(-2px)}
    .slot.filled:hover .glowfx,
    .slot.filled:focus-visible .glowfx{opacity:.8}
  }
</style>
</head>

    <p class="limbinfo" id="limbInfo">hover body to inspect</p>
  </section>

  <section class="panel tilt-r" aria-label="Ground">
    <div class="plate" aria-hidden="true"></div>
    <div class="panel-head">
      <div class="who">
        <span class="name" id="gName">Ground</span>
        <span class="meta" id="gMeta">Drop zone</span>
      </div>
      <div class="head-right">
        <span class="kg"><b id="gKg">0.0</b> kg</span>
        <div class="paysel" id="paySel">
          <button class="paybtn active" data-pay="cash">Cash</button>
          <button class="paybtn" data-pay="bank">Card</button>
        </div>
      </div>
    </div>
    <div class="wbar" id="gBar"><div class="fill"></div></div>
    <div class="grid" id="ground"></div>
  </section>

</div>

<div class="cart" id="cart" aria-hidden="true">
  <div class="cart-head"><span class="cart-title">Checkout</span><button class="cart-x" id="cartClose" title="Clear cart">&times;</button></div>
  <div class="cart-list" id="cartList"></div>
  <div class="cart-foot">
    <div class="cart-bal"><span>Cash <b id="cartCash">$0</b></span><span>Bank <b id="cartBank">$0</b></span></div>
    <div class="cart-sum"><span>Items <b id="cartCount">0</b></span><span class="cart-total">Total <b id="cartTotal">$0</b></span></div>
    <div class="cart-pay"><button class="cart-btn cash" id="payCash">Pay Cash</button><button class="cart-btn card" id="payCard">Pay Card</button></div>
    <button class="cart-clear" id="cartClear">Clear cart</button>
  </div>
</div>
<div class="tip" id="tip" role="tooltip"></div>
<div class="menu" id="menu" role="menu"></div>
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
(function(){
  "use strict";

  const CONFIG = { hotbarSlots: 5, columns: 5 };

  let CATALOG = {};
  let IMAGEPATH = "nui://w2f-inventory/web/images";

  const state = {
    inv:    [],
    ground: [],
    leftMeta:  { id:null, type:"player", slots:0, maxWeight:0, label:"" },
    rightMeta: { id:null, type:"drop",   slots:0, maxWeight:0, label:"Ground" },
    selected: null,
    open: false,
    pay: "cash",
    cart: [],
    money: { cash:0, bank:0 },
  };

  const $ = s => document.querySelector(s);
  const invEl=$("#inv"), gndEl=$("#ground"), amountEl=$("#amount");
  const tipEl=$("#tip"), menuEl=$("#menu"), toastEl=$("#toast"), appEl=$(".app");

  const arr  = z => z==="inv" ? state.inv : state.ground;
  const meta = z => z==="inv" ? state.leftMeta : state.rightMeta;
  const root = z => z==="inv" ? invEl : gndEl;
  const kg   = g => (Math.max(0,Number(g)||0)/1000).toFixed(1);
  const REDUCED = matchMedia("(prefers-reduced-motion: reduce)").matches;

  const esc = s => String(s).replace(/[&<>"']/g,
    c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

  // hunger/thirst below this fullness value light up the body aura
  const LOW_STAT = 30;
  const LIMBS = [
    { key:"head",  label:"Head",      x:34, y:3,  w:32, h:13 },
    { key:"torso", label:"Torso",     x:28, y:16, w:44, h:30 },
    { key:"l_arm", label:"Left arm",  x:5,  y:18, w:23, h:38 },
    { key:"r_arm", label:"Right arm", x:72, y:18, w:23, h:38 },
    { key:"l_leg", label:"Left leg",  x:27, y:47, w:23, h:49 },
    { key:"r_leg", label:"Right leg", x:50, y:47, w:23, h:49 },
  ];
  $("#limbs").innerHTML = LIMBS.map(l=>`
    <span class="limb" data-limb="${l.key}" role="button" tabindex="0"
      aria-label="${l.label}" data-value="100"
      style="left:${l.x}%;top:${l.y}%;width:${l.w}%;height:${l.h}%"></span>`).join("");

  const inFiveM = typeof GetParentResourceName === "function";
  const RES = inFiveM ? GetParentResourceName() : "w2f-inventory";

  function nuiPost(name, data, cb){
    if (!inFiveM) { if (cb) cb(null); return; }
    fetch(`https://${RES}/${name}`, {
      method:"POST",
      headers:{ "Content-Type":"application/json; charset=UTF-8" },
      body: JSON.stringify(data ?? {})
    }).then(r=>r.json().catch(()=>null)).then(j=>{ if (cb) cb(j); }).catch(()=>{ if (cb) cb(null); });
  }

  function itemDef(name){ return CATALOG[name] || {}; }
  function itemLabel(name){ const d=itemDef(name); return d.label || name || "Item"; }
  function imgUrl(name){
    const d = itemDef(name);
    let img = d.image;
    if (!img) img = (name||"") + ".png";
    if (/^[\w]+:\/\//.test(img)) return img;       // already a full nui:// url
    return `${IMAGEPATH}/${img}`;
  }

  const sigCache = { inv:[], ground:[] };

  function buildGrid(zone, n){
    const r = root(zone);
    r.innerHTML = "";
    arr(zone).length = n;
    sigCache[zone] = new Array(n).fill("");
    const frag = document.createDocumentFragment();
    for (let i=0;i<n;i++){
      if (zone==="inv" && i===CONFIG.hotbarSlots){
        const d = document.createElement("div");
        d.className = "divider"; d.setAttribute("aria-hidden","true");
        frag.appendChild(d);
      }
      const s = document.createElement("div");
      s.className = "slot empty";
      s.dataset.zone = zone; s.dataset.index = i;
      s.tabIndex = 0; s.setAttribute("role","button");
      s.style.setProperty("--tilt", ((Math.sin(i*1.7)*0.8)).toFixed(2)+"deg");
      s.style.setProperty("--dur", (5+((i*7)%4)).toFixed(2)+"s");
      s.style.setProperty("--delay", (-((i*3)%8)).toFixed(2)+"s");
      s.innerHTML = `<div class="hang"><span class="glowfx" aria-hidden="true"></span><div class="face"></div></div>`;
      frag.appendChild(s);
    }
    r.appendChild(frag);
  }

  const slotEl = (zone,i) => root(zone).querySelector(`.slot[data-index="${i}"]`);

  function canCraftCheck(ing){
    for (const k in ing){
      let have = 0;
      for (const sl of state.inv) if (sl && sl.name===k) have += sl.count;
      if (have < ing[k]) return false;
    }
    return true;
  }

  function renderSlot(zone, i){
    const st = arr(zone)[i];
    const el = slotEl(zone, i);
    if (!el) return;
    const noCraft = !!(st && zone==="ground" && state.rightMeta.type==="crafting"
      && st.metadata && st.metadata.ingredients && !canCraftCheck(st.metadata.ingredients));
    const sig = st ? JSON.stringify(st)+(noCraft?"!nc":"") : "";
    el.classList.toggle("selected",
      !!st && state.selected && state.selected.zone===zone && state.selected.index===i);
    if (sig === sigCache[zone][i]) return;
    sigCache[zone][i] = sig;

    const face = el.querySelector(".face");
    el.classList.toggle("filled", !!st);
    el.classList.toggle("nocraft", noCraft);
    el.classList.toggle("empty", !st);
    el.dataset.rarity = "";
    if (!st){
      face.innerHTML = "";
      el.setAttribute("aria-label", `empty slot ${i+1}`);
      return;
    }
    const label = itemLabel(st.name);
    const dura  = (st.metadata && typeof st.metadata.durability === "number")
      ? Math.max(0, Math.min(100, st.metadata.durability)) : null;
    el.setAttribute("aria-label", `${label}, quantity ${st.count}`);
    face.innerHTML = `
      ${st.count>1 ? `<span class="qty">${st.count}</span>` : ""}
      <span class="wt">${kg(st.weight)}</span>
      ${zone==="inv" && i<CONFIG.hotbarSlots ? `<span class="hotkey">${i+1}</span>` : ""}
      <img class="glyph iimg" alt="" src="${esc(imgUrl(st.name))}"
           style="width:46px;height:46px;object-fit:contain;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5))"
           onerror="this.style.visibility='hidden'">
      ${dura!==null ? `<span class="dura ${dura<=25?"crit":dura<=50?"low":""}"><i style="width:${dura}%"></i></span>` : ""}
      <span class="name">${esc(label)}</span>`;
  }

  function zoneWeight(zone){
    return arr(zone).reduce((t,s)=>s?t+(Number(s.weight)||0):t,0);
  }

  function render(){
    for (const zone of ["inv","ground"])
      for (let i=0;i<arr(zone).length;i++) renderSlot(zone,i);

    const lMax = state.leftMeta.maxWeight||1;
    const pw = zoneWeight("inv"), pct = Math.min(100, pw/lMax*100);
    tweenKg(pw);
    $("#pMax").textContent = kg(lMax);
    $("#pBar .fill").style.width = pct+"%";
    $("#pBar").classList.toggle("heavy", pct>=80);

    const gw = zoneWeight("ground");
    const rMax = state.rightMeta.maxWeight||1;
    $("#gKg").textContent = kg(gw);
    $("#gBar .fill").style.width = Math.min(100, gw/rMax*100)+"%";

    const gName=$("#gName"), gMeta=$("#gMeta");
    if (gName) gName.textContent = state.rightMeta.label || "Ground";
    if (gMeta) gMeta.textContent = secondaryCaption(state.rightMeta.type);
    const paySel = $("#paySel");
    if (paySel) paySel.classList.toggle("show", state.rightMeta.type === "shop");

    $("#playerMeta").textContent = state.leftMeta.id!=null ? `ID ${state.leftMeta.id} · Pockets` : "Pockets";
    renderCart();
  }

  function secondaryCaption(type){
    switch(type){
      case "stash": return "Stash";
      case "trunk": return "Vehicle trunk";
      case "glovebox": return "Glovebox";
      case "shop": return "Shop";
      case "crafting": return "Crafting";
      case "admin": return "All items · drag to give, drop in to delete";
      case "container": return "Container";
      case "drop": case "newdrop": default: return "Drop zone";
    }
  }

  let pKgShown = 0, pKgRaf = null;
  function tweenKg(target){
    if (REDUCED){ pKgShown=target; $("#pKg").textContent = kg(target); return; }
    cancelAnimationFrame(pKgRaf);
    const startV = pKgShown, t0 = performance.now(), durMs = 240;
    (function step(t){
      const p = Math.min(1,(t-t0)/durMs), e = 1-Math.pow(1-p,3);
      pKgShown = startV+(target-startV)*e;
      $("#pKg").textContent = kg(pKgShown);
      if (p<1) pKgRaf = requestAnimationFrame(step);
    })(t0);
  }

  let toastTimer=null;
  function toast(msg, err){
    toastEl.textContent = msg;
    toastEl.classList.toggle("err", !!err);
    toastEl.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>toastEl.classList.remove("show"), 2200);
  }
  function deny(zone, index, msg){
    const el = slotEl(zone,index);
    if (el){ el.classList.add("deny"); setTimeout(()=>el.classList.remove("deny"), 280); }
    if (msg) toast(msg, true);
  }
  function settle(zone, index){
    if (REDUCED) return;
    const el = slotEl(zone,index);
    if (!el) return;
    el.classList.add("settle");
    setTimeout(()=>el.classList.remove("settle"), 280);
  }

  function getAmount(max){
    const raw = amountEl.value.trim();
    if (raw==="") return max;
    const v = parseInt(raw, 10);
    return isNaN(v) || v<1 ? max : Math.min(v, max);
  }

  const isSel = (z,i)=> state.selected && state.selected.zone===z && state.selected.index===i;
  function select(zone, index){
    state.selected = arr(zone)[index] ? {zone,index} : null;
    render();
  }

  function typeOf(zone){ return zone==="inv" ? "player" : (state.rightMeta.type || "drop"); }
  function invIdOf(zone){ return zone==="inv" ? "player" : state.rightMeta.id; }

  function useAt(zone, index){
    if (zone!=="inv") return;                       // only player items are "used"
    const st = arr(zone)[index]; if (!st) return;
    nuiPost("useItem", index+1);
  }

  function giveAt(zone, index){
    if (zone!=="inv") return;
    const st = arr(zone)[index]; if (!st) return;
    const n = getAmount(st.count);
    nuiPost("giveItem", { slot:index+1, count:n });
  }

  function dropAt(zone, index){
    if (zone!=="inv") return;
    const st = arr(zone)[index]; if (!st) return;
    const n = getAmount(st.count);
    const rt = state.rightMeta.type;
    const openContainer = state.rightMeta.id != null && rt!=="shop" && rt!=="crafting" && rt!=="newdrop";
    if (openContainer){
      const empty = state.ground.findIndex(s=>!s);
      if (empty===-1) return deny(zone,index,"No room");
      sendSwap({zone:"inv",index}, {zone:"ground",index:empty}, n);     
    } else {
      sendSwap({zone:"inv",index}, {zone:"ground",index:0}, n, "newdrop"); 
    }
  }

  const cloneSlot = o => o ? JSON.parse(JSON.stringify(o)) : null;

  function applyMoveLocal(from, to, count){
    const A = arr(from.zone), B = arr(to.zone);
    const src = A[from.index]; if (!src) return false;
    const dst = B[to.index];
    const def = itemDef(src.name);
    const cnt = Math.min(count, src.count);
    const perW = src.count > 0 ? src.weight / src.count : 0;
    if (!dst){
      if (cnt >= src.count){ src.slot = to.index+1; B[to.index] = src; A[from.index] = null; }
      else {
        B[to.index] = { name:src.name, count:cnt, weight:perW*cnt, metadata:src.metadata, slot:to.index+1 };
        src.count -= cnt; src.weight = perW * src.count;
      }
    } else if (dst.name === src.name && def.stack !== false){
      dst.count += cnt; dst.weight = perW * dst.count;
      if (cnt >= src.count) A[from.index] = null;
      else { src.count -= cnt; src.weight = perW * src.count; }
    } else if (cnt >= src.count){
      dst.slot = from.index+1; src.slot = to.index+1;
      A[from.index] = dst; B[to.index] = src;
    } else return false;
    return true;
  }

  function throwAt(zone, index){
    if (zone!=="inv") return;
    const st = arr(zone)[index]; if (!st) return;
    nuiPost("throwItem", { slot:index+1, count:getAmount(st.count) });
  }

  function sendSwap(from, to, count, forceToType){
    const src = arr(from.zone)[from.index];
    if (!src) return;
    const fromType = typeOf(from.zone);
    const toType   = forceToType || typeOf(to.zone);
    if (fromType === "admin" || toType === "admin"){
      const raw = parseInt(amountEl.value, 10);
      const cnt2 = fromType === "admin" ? (raw > 0 ? raw : 1) : Math.min(count || src.count, src.count);
      nuiPost("swapItems", { fromSlot: from.index+1, fromType, toSlot: to.index+1, toType, count: cnt2 });
      return;
    }

    const cnt = Math.min(count || src.count, src.count);

    if (fromType === "shop"){
      nuiPost("buyItem", { fromSlot: from.index+1, toSlot: to.index+1, count: cnt, payment: state.pay }, ()=>{});
      return;
    }
    if (fromType === "crafting"){
      nuiPost("craftItem", { fromSlot: from.index+1, toSlot: to.index+1, count: cnt, duration: src.metadata && src.metadata.duration });
      return;
    }

    let revert = null;
    if (toType === "newdrop"){
      const before = cloneSlot(src), perW = src.weight / src.count;
      if (cnt >= src.count) arr(from.zone)[from.index] = null;
      else { src.count -= cnt; src.weight = perW * src.count; }
      revert = () => { arr(from.zone)[from.index] = before; };
    } else {
      const sFrom = { z:from.zone, i:from.index, v:cloneSlot(arr(from.zone)[from.index]) };
      const sTo   = { z:to.zone,   i:to.index,   v:cloneSlot(arr(to.zone)[to.index]) };
      if (applyMoveLocal(from, to, cnt)){
        revert = () => { arr(sFrom.z)[sFrom.i] = sFrom.v; arr(sTo.z)[sTo.i] = sTo.v; };
        settle(to.zone, to.index);
      }
    }
    state.selected = null;
    render();

    nuiPost("swapItems", {
      fromSlot: from.index+1, fromType: fromType,
      toSlot: to.index+1, toType: toType, count: cnt,
    }, ok => {
      if (ok === false && revert){ revert(); render(); deny(from.zone, from.index, "Can't move that"); }
    });
  }

  function splitHalf(zone, index){
    const st = arr(zone)[index];
    if (!st || st.count<2) return;
    const empty = arr(zone).findIndex(s=>!s);
    if (empty===-1) return deny(zone,index,"No empty slot");
    sendSwap({zone,index},{zone,index:empty}, Math.floor(st.count/2));
  }

  function transfer(from, to, forcedAmt){
    if (from.zone===to.zone && from.index===to.index) return;
    const src = arr(from.zone)[from.index];
    if (!src) return;
    const amt = forcedAmt!==undefined ? Math.min(forcedAmt, src.count) : getAmount(src.count);
    sendSwap(from, to, amt);
  }

  function quickMove(zone, i){
    const st = arr(zone)[i]; if (!st) return;
    const to = zone==="inv" ? "ground" : "inv";
    if (meta(to).slots<=0 && to==="ground") return;
    let dest = arr(to).findIndex(x=>x && x.name===st.name);
    if (dest===-1) dest = arr(to).findIndex(x=>!x);
    if (dest===-1) return deny(zone,i,"No room");
    transfer({zone,index:i},{zone:to,index:dest}, st.count);
  }

  $("#btnSort").addEventListener("click", ()=>toast("Sorting is handled server-side"));
  $("#btnClose").addEventListener("click", closeInventory);
  $("#paySel").addEventListener("click", e=>{
    const b = e.target.closest(".paybtn"); if (!b) return;
    state.pay = b.dataset.pay;
    document.querySelectorAll(".paybtn").forEach(x=>x.classList.toggle("active", x===b));
  });

  function closeInventory(){
    hideTip(); hideMenu();
    nuiPost("exit");
  }

  let drag=null;
  function slotAt(x,y){
    const el = document.elementFromPoint(x,y);
    const s = el && el.closest ? el.closest(".slot") : null;
    return s ? {zone:s.dataset.zone, index:+s.dataset.index, el:s} : null;
  }
  document.addEventListener("pointerdown", e=>{
    if (e.button!==undefined && e.button!==0) return;
    const s = e.target.closest(".slot");
    if (!s) return;
    e.preventDefault();
    const zone=s.dataset.zone, index=+s.dataset.index;
    if (!arr(zone)[index]){ select(zone,index); return; }
    if (e.shiftKey){ quickMove(zone,index); return; }
    if (e.pointerId!=null){ try{ s.setPointerCapture(e.pointerId); }catch(_){} }
    drag = { from:{zone,index}, el:s, ghost:null, started:false, x:e.clientX, y:e.clientY, pid:e.pointerId };
  });
  document.addEventListener("pointermove", e=>{
    if (drag){
      if (!drag.started){
        if (Math.hypot(e.clientX-drag.x, e.clientY-drag.y) < 6) return;
        drag.started = true; hideTip(); hideMenu();
        const st = arr(drag.from.zone)[drag.from.index];
        const g = document.createElement("div");
        g.className = "ghost";
        g.innerHTML = `${st.count>1?`<span class="gq">${st.count}</span>`:""}<img alt="" src="${esc(imgUrl(st.name))}" style="width:40px;height:40px;object-fit:contain" onerror="this.style.visibility='hidden'">`;
        document.body.appendChild(g);
        drag.ghost = g; drag.el.classList.add("dragging");
      }
      drag.ghost.style.left = e.clientX+"px";
      drag.ghost.style.top  = e.clientY+"px";
      const dx = e.clientX - (drag.lastX ?? e.clientX);
      drag.lastX = e.clientX;
      drag.tilt = Math.max(-9, Math.min(9, (drag.tilt||0)*0.82 + dx*0.55));
      if (!REDUCED) drag.ghost.style.rotate = drag.tilt.toFixed(1)+"deg";
      document.querySelectorAll(".over").forEach(el=>el.classList.remove("over"));
      const over = slotAt(e.clientX, e.clientY);
      if (over && !(over.zone===drag.from.zone && over.index===drag.from.index))
        over.el.classList.add("over");
      return;
    }
    trackTip(e);
  });
  document.addEventListener("pointerup", e=>{
    if (!drag) return;
    if (drag.pid!=null){ try{ drag.el.releasePointerCapture(drag.pid); }catch(_){} }
    document.querySelectorAll(".over").forEach(el=>el.classList.remove("over"));
    drag.el.classList.remove("dragging");
    if (drag.ghost) drag.ghost.remove();
    if (drag.from.zone==="ground" && state.rightMeta.type==="shop"){
      addToCart(drag.from.index);
    } else if (drag.started){
      const over = slotAt(e.clientX, e.clientY);
      if (over) transfer(drag.from, {zone:over.zone, index:over.index});
    } else {
      select(drag.from.zone, drag.from.index);
    }
    drag = null;
  });
  document.addEventListener("pointercancel", ()=>{
    if (drag){ if (drag.ghost) drag.ghost.remove(); drag.el.classList.remove("dragging"); drag = null; }
  });
  document.addEventListener("dblclick", e=>{
    const s = e.target.closest(".slot");
    if (!s) return;
    if (s.dataset.zone==="ground" && state.rightMeta.type==="shop") return;
    if (s.dataset.zone==="ground") quickMove("ground", +s.dataset.index);
    else useAt(s.dataset.zone, +s.dataset.index);
  });

  let tipFor=null, tipTimer=null;
  function trackTip(e){
    const s = e.target.closest ? e.target.closest(".slot") : null;
    if (!s || !arr(s.dataset.zone)[+s.dataset.index]){ hideTip(); return; }
    const key = s.dataset.zone+s.dataset.index;
    if (key !== tipFor){
      tipFor = key; tipEl.classList.remove("show");
      clearTimeout(tipTimer);
      tipTimer = setTimeout(()=>showTip(s), 160);
    }
    positionTip(s);
  }
  function showTip(s){
    const zone=s.dataset.zone, i=+s.dataset.index;
    const st = arr(zone)[i]; if (!st) return;
    const d = itemDef(st.name);
    const dura = (st.metadata && typeof st.metadata.durability==="number")
      ? Math.max(0,Math.min(100,st.metadata.durability)) : null;
    const m = st.metadata || {};
    const rows = [];
    rows.push(`<div class="row"><span>Weight</span><span>${kg(st.weight)} kg</span></div>`);
    rows.push(`<div class="row"><span>Quantity</span><span>${st.count}</span></div>`);
    if (dura!==null) rows.push(`<div class="row"><span>Condition</span><span>${Math.floor(dura)}%</span></div>`);
    if (m.serial)    rows.push(`<div class="row"><span>Serial</span><span>${esc(m.serial)}</span></div>`);
    if (m.ammo!=null)rows.push(`<div class="row"><span>Ammo</span><span>${esc(m.ammo)}</span></div>`);
    if (m.ingredients){
      const parts = Object.keys(m.ingredients).map(k=>`${itemLabel(k)} x${m.ingredients[k]}`).join(", ");
      rows.push(`<div class="row"><span>Needs</span><span>${esc(parts)}</span></div>`);
    }
    if (st.price!=null) rows.push(`<div class="row"><span>Price</span><span>$${Number(st.price).toLocaleString()} (${state.pay==="bank"?"card":"cash"})</span></div>`);
    tipEl.innerHTML = `
      <h4>${esc(m.label || d.label || st.name)}</h4>
      <p>${esc(m.description || d.description || "")}</p>
      <div class="rows">${rows.join("")}</div>`;
    positionTip(s);
    tipEl.classList.add("show");
  }
  function positionTip(s){
    const r = s.getBoundingClientRect();
    let x = r.right + 10, y = r.top;
    const tw = 230, th = tipEl.offsetHeight || 140;
    if (x + tw > innerWidth - 8) x = r.left - tw - 10;
    if (y + th > innerHeight - 8) y = innerHeight - th - 8;
    tipEl.style.left = x+"px"; tipEl.style.top  = y+"px";
  }
  function hideTip(){ tipFor=null; clearTimeout(tipTimer); tipEl.classList.remove("show"); }

  // right-click an item once to open a menu with every action
  document.addEventListener("contextmenu", e=>{
    const s = e.target.closest(".slot");
    if (!s) { hideMenu(); return; }
    e.preventDefault();
    const zone=s.dataset.zone, i=+s.dataset.index;
    const st = arr(zone)[i];
    if (!st){ hideMenu(); return; }
    const inv = zone==="inv";
    hideTip(); select(zone, i);
    menuEl.innerHTML = `
      <button data-act="use"   ${inv?"":"disabled"}>Use</button>
      <button data-act="give"  ${inv?"":"disabled"}>Give</button>
      <button data-act="split" ${st.count>1?"":"disabled"}>Split half</button>
      <button data-act="throw" ${inv?"":"disabled"}>Throw</button>
      <button data-act="drop"  class="danger" ${inv?"":"disabled"}>Drop</button>`;
    menuEl.classList.add("show");
    const mw=150, mh=menuEl.offsetHeight||140;
    menuEl.style.left = Math.min(e.clientX, innerWidth-mw-8)+"px";
    menuEl.style.top  = Math.min(e.clientY, innerHeight-mh-8)+"px";
    menuEl.dataset.zone = zone; menuEl.dataset.index = i;
  });
  menuEl.addEventListener("click", e=>{
    const b = e.target.closest("button[data-act]");
    if (!b || b.disabled) return;
    const zone = menuEl.dataset.zone, i = +menuEl.dataset.index;
    hideMenu();
    if (b.dataset.act==="use")   useAt(zone,i);
    if (b.dataset.act==="give")  giveAt(zone,i);
    if (b.dataset.act==="split") splitHalf(zone,i);
    if (b.dataset.act==="throw") throwAt(zone,i);
    if (b.dataset.act==="drop")  dropAt(zone,i);
  });
  function hideMenu(){ menuEl.classList.remove("show"); }
  document.addEventListener("pointerdown", e=>{ if (!e.target.closest(".menu")) hideMenu(); });

  document.addEventListener("keydown", e=>{
    if (document.activeElement===amountEl) {
      if (e.key==="Escape") amountEl.blur();
      return;
    }
    if (e.key==="Escape"){ hideMenu(); hideTip(); closeInventory(); return; }
    if (/^[1-5]$/.test(e.key)){
      const i = +e.key-1;
      const el = slotEl("inv", i);
      if (el){ el.classList.add("flash"); setTimeout(()=>el.classList.remove("flash"), 220); }
      if (state.inv[i]) useAt("inv", i);
      return;
    }
    const f = document.activeElement;
    if (!f || !f.classList || !f.classList.contains("slot")) return;
    const zone=f.dataset.zone, i=+f.dataset.index, C=CONFIG.columns;
    if (e.key==="Enter"){ e.preventDefault(); select(zone,i); useAt(zone,i); return; }
    let j=null;
    if (e.key==="ArrowRight") j=i+1;
    if (e.key==="ArrowLeft")  j=i-1;
    if (e.key==="ArrowDown")  j=i+C;
    if (e.key==="ArrowUp")    j=i-C;
    if (j===null) return;
    e.preventDefault();
    if (j>=0 && j<arr(zone).length){ const t=slotEl(zone,j); if (t) t.focus(); }
  });

  const bodyEl = $("#bodyFig"), rotEl = $("#bodyRot"), limbInfo = $("#limbInfo");
  if (!REDUCED && bodyEl){
    bodyEl.addEventListener("pointermove", e=>{
      const r = bodyEl.getBoundingClientRect();
      const px = (e.clientX-r.left)/r.width*2-1;
      const py = (e.clientY-r.top)/r.height*2-1;
      rotEl.style.transform = `rotateY(${(px*8).toFixed(1)}deg) rotateX(${(-py*5).toFixed(1)}deg)`;
    });
    bodyEl.addEventListener("pointerleave", ()=>{ rotEl.style.transform=""; });
  }

  function applyMeta(target, inv){
    if (!inv) return;
    target.id        = inv.id;
    target.type      = inv.type || target.type;
    target.slots     = inv.slots || target.slots;
    target.maxWeight = inv.maxWeight || target.maxWeight;
    target.label     = inv.label || target.label;
  }

  function loadItems(zone, items, slots){
    const n = slots || meta(zone).slots || (zone==="inv"?50:50);
    const a = new Array(n).fill(null);
    if (items){
      const list = Array.isArray(items) ? items : Object.values(items);
      for (const it of list){
        if (!it || it.slot==null || !it.name) continue;
        const idx = it.slot-1;
        if (idx>=0 && idx<n) a[idx] = sanitizeSlot(it);
      }
    }
    state[zone==="inv"?"inv":"ground"] = a;
  }

  function sanitizeSlot(it){
    return {
      name: it.name,
      count: Number(it.count)||0,
      weight: Number(it.weight)||0,
      metadata: it.metadata || null,
      slot: it.slot,
      price: it.price,
    };
  }

  function applySlotUpdate(entry){
    const inventory = entry.inventory;
    const it = entry.item;
    if (!it || it.slot==null) return;
    const zone = (inventory==null || inventory==="player" || inventory===state.leftMeta.id) ? "inv" : "ground";
    const a = arr(zone);
    const idx = it.slot-1;
    if (idx<0 || idx>=a.length) return;
    a[idx] = (it.count && it.name) ? sanitizeSlot(it) : null;
  }

  function setOpen(isOpen){
    state.open = isOpen;
    if (appEl) appEl.style.display = isOpen ? "grid" : "none";
    document.body.style.background = "transparent";
    if (!isOpen){ hideTip(); hideMenu(); state.selected=null; state.cart=[]; }
    renderCart();
  }

  function renderInjuryRoots(limbs){
    const roots = $("#injRoots"), tags = $("#injTags");
    if (roots) roots.innerHTML = "";
    if (tags) tags.innerHTML = "";
    const NS = "http://www.w3.org/2000/svg";
    for (const l of LIMBS){
      const lv = Math.max(0, Math.min(100, Number(limbs[l.key]) ?? 100));
      if (lv >= 50) continue;
      const cx = l.x + l.w/2, cy = l.y + l.h/2;
      const left = cx < 50, crit = lv <= 25;
      const lx = Math.max(8, Math.min(92, cx + (left ? -20 : 20)));
      const ly = Math.max(8, Math.min(92, cy));
      if (roots){
        const ln = document.createElementNS(NS, "line");
        ln.setAttribute("x1", cx); ln.setAttribute("y1", cy);
        ln.setAttribute("x2", lx); ln.setAttribute("y2", ly);
        if (crit) ln.setAttribute("class", "crit");
        roots.appendChild(ln);
        const c = document.createElementNS(NS, "circle");
        c.setAttribute("cx", cx); c.setAttribute("cy", cy); c.setAttribute("r", "1.5");
        if (crit) c.setAttribute("class", "crit");
        roots.appendChild(c);
      }
      if (tags){
        const t = document.createElement("div");
        t.className = "injtag" + (crit ? " crit" : "");
        t.style.left = lx + "%"; t.style.top = ly + "%";
        t.style.transform = "translate(" + (left ? "-100%" : "0") + ",-50%)";
        t.textContent = l.label.replace("Left","L").replace("Right","R") + " " + Math.round(lv);
        tags.appendChild(t);
      }
    }
  }

  function updateStatus(s){
    if (!s) return;
    const limbs = s.limbs || {};
    document.querySelectorAll(".limb").forEach(el=>{
      const v = Math.max(0, Math.min(100, Number(limbs[el.dataset.limb]) ?? 100));
      el.dataset.value = v;
      el.classList.toggle("hurt", v<50 && v>25);
      el.classList.toggle("crit", v<=25);
      el.innerHTML = v<50 ? `<span class="dot"></span>` : "";
    });
    renderInjuryRoots(limbs);
    const hp = Math.max(0, Math.min(100, Number(s.health) || 0));
    const bleed = Number(s.bleed) || 0;
    const bf = $("#bodyFill"); if (bf) bf.style.clipPath = `inset(${100-hp}% 0 0 0)`;
    const fig = $("#bodyFig");
    if (fig){
      fig.classList.toggle("low",  (hp<=50 && hp>25) || bleed===1 || bleed===2);
      fig.classList.toggle("crit", hp<=25 || bleed>=3);
      const hunger = Math.max(0, Math.min(100, Number(s.hunger) ?? 100));
      const thirst = Math.max(0, Math.min(100, Number(s.thirst) ?? 100));
      fig.classList.toggle("hungry",  hunger <= LOW_STAT);
      fig.classList.toggle("thirsty", thirst <= LOW_STAT);
    }
  }

  function cartTotal(){ return state.cart.reduce((t,c)=>t+c.price*c.count,0); }
  function cartCount(){ return state.cart.reduce((t,c)=>t+c.count,0); }

  function addToCart(i){
    if (state.rightMeta.type!=="shop") return;
    const it = state.ground[i]; if (!it) return;
    const raw = parseInt(amountEl.value,10); const amt = raw>0 ? raw : 1;
    const ex = state.cart.find(c=>c.slot===i+1);
    if (ex) ex.count += amt; else state.cart.push({ slot:i+1, name:it.name, price:it.price||0, count:amt });
    settle("ground", i); renderCart();
  }
  function setCartQty(slot, d){
    const c = state.cart.find(x=>x.slot===slot); if (!c) return;
    c.count += d; if (c.count<=0) state.cart = state.cart.filter(x=>x.slot!==slot);
    renderCart();
  }
  function clearCart(){ state.cart = []; renderCart(); }
  function updateMoney(){
    const c=$("#cash"), b=$("#bank");
    if (c) c.textContent = Number(state.money.cash||0).toLocaleString();
    if (b) b.textContent = Number(state.money.bank||0).toLocaleString();
    renderCart();
  }
  function renderCart(){
    const cart=$("#cart"); if (!cart) return;
    const show = state.open && state.rightMeta.type==="shop";
    cart.classList.toggle("show", show);
    if (!show) return;
    const list=$("#cartList");
    list.innerHTML = state.cart.length ? state.cart.map(c=>`
      <div class="cart-row" data-slot="${c.slot}">
        <img class="cart-ic" alt="" src="${esc(imgUrl(c.name))}" onerror="this.style.visibility='hidden'">
        <div class="cart-info"><span class="cart-nm">${esc(itemLabel(c.name))}</span><span class="cart-pr">$${Number(c.price).toLocaleString()} ea</span></div>
        <div class="cart-qty"><button data-d="-1">&minus;</button><b>${c.count}</b><button data-d="1">+</button></div>
        <span class="cart-lt">$${Number(c.price*c.count).toLocaleString()}</span>
      </div>`).join("") : `<div class="cart-empty">Cart is empty<br>drag or click shop items to add</div>`;
    const tot = cartTotal();
    $("#cartCount").textContent = cartCount();
    $("#cartTotal").textContent = "$"+tot.toLocaleString();
    $("#cartCash").textContent = "$"+Number(state.money.cash||0).toLocaleString();
    $("#cartBank").textContent = "$"+Number(state.money.bank||0).toLocaleString();
    $("#payCash").classList.toggle("poor", tot>Number(state.money.cash||0));
    $("#payCard").classList.toggle("poor", tot>Number(state.money.bank||0));
  }
  function doCheckout(method){
    if (!state.cart.length) return;
    const tot = cartTotal();
    const bal = method==="bank" ? Number(state.money.bank||0) : Number(state.money.cash||0);
    if (tot>bal){ toast(method==="bank"?"Not enough on card":"Not enough cash", true); return; }
    nuiPost("checkout", { items: state.cart.map(c=>({ slot:c.slot, count:c.count })), payment: method }, res=>{
      if (res && res.ok){
        if (res.cash!=null) state.money.cash = res.cash;
        if (res.bank!=null) state.money.bank = res.bank;
        clearCart(); updateMoney(); toast("Purchase complete");
      } else { renderCart(); }
    });
  }

  $("#cartList").addEventListener("click", e=>{
    const btn = e.target.closest("button[data-d]"); if (!btn) return;
    const row = btn.closest(".cart-row"); if (!row) return;
    setCartQty(+row.dataset.slot, +btn.dataset.d);
  });
  $("#payCash").addEventListener("click", ()=>doCheckout("cash"));
  $("#payCard").addEventListener("click", ()=>doCheckout("bank"));
  $("#cartClear").addEventListener("click", clearCart);
  $("#cartClose").addEventListener("click", clearCart);

  window.addEventListener("message", ev=>{
    const d = ev.data || {};
    const data = d.data || {};
    switch(d.action){
      case "init": {
        if (data.items)     CATALOG = data.items;
        if (data.imagepath) IMAGEPATH = data.imagepath;
        if (data.leftInventory){
          applyMeta(state.leftMeta, data.leftInventory);
          buildGrid("inv", state.leftMeta.slots);
          loadItems("inv", data.leftInventory.items, state.leftMeta.slots);
        }
        if (!state.ground.length){ buildGrid("ground", 30); state.rightMeta.slots=30; }
        render();
        break;
      }
      case "setupInventory": {
        applyMeta(state.leftMeta,  data.leftInventory);
        applyMeta(state.rightMeta, data.rightInventory);
        buildGrid("inv", state.leftMeta.slots || 50);
        buildGrid("ground", state.rightMeta.slots || 50);
        loadItems("inv", data.leftInventory && data.leftInventory.items, state.leftMeta.slots);
        loadItems("ground", data.rightInventory && data.rightInventory.items, state.rightMeta.slots);
        state.selected = null;
        state.cart = [];
        setOpen(true);
        render();
        break;
      }
      case "refreshSlots": {
        const items = data.items;
        if (Array.isArray(items)) items.forEach(applySlotUpdate);
        else if (items && items.item) applySlotUpdate(items);
        render();
        break;
      }
      case "itemNotify": {
        const it = (data && data[0]) || {};
        const label = it.label || it.name || "Item";
        const key = (data && data[1]) || "";
        const count = data && data[2];
        const verbs = { ui_added:"Received", ui_removed:"Removed", ui_used:"Used",
                        ui_equipped:"Equipped", ui_holstered:"Holstered" };
        const verb = verbs[key] || "";
        toast(((verb ? verb + " " : "") + label + (count ? (" x" + count) : "")).trim());
        break;
      }
      case "status": {
        updateStatus(data);
        break;
      }
      case "money": {
        state.money = { cash: Number(data && data.cash) || 0, bank: Number(data && data.bank) || 0 };
        updateMoney();
        break;
      }
      case "displayMetadata": {
        
        break;
      }
      case "closeInventory": {
        setOpen(false);
        break;
      }
      case "toggleHotbar":
      default:
        break;
    }
  });

  setOpen(false);
  nuiPost("uiLoaded", {});
})();
</script>
</body>
</html>
